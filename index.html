<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love you ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
    overflow:hidden;
}

.card{
    width:380px;
    padding:30px;
    text-align:center;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.3);
    border-radius:25px;

    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    color:white;
}

.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    margin-bottom:20px;
}

h1{
    font-size:2rem;
}

.subtitle{
    opacity:0.9;
    margin-top:8px;
}

.btn{
    margin-top:25px;
    padding:12px 28px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f81;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
}

.message{
    display:none;
    margin-top:20px;
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">

    <img src="IMG_3361.JPG" class="profile">

    <h1> FOR FOCUS </h1>

    <p class="subtitle">I love you so much, my dear. You are the light of my life and the reason for my happiness.</p>


 <button class="btn" onclick="showVideo()"> Open this </button> <div id="popup" style=" display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; "> 
    <div style="background:white;padding:20px;border-radius:15px;"> 
    <video width="600" controls> <source src="Love you.mov" type="video/mp4"> </video> <br><br> <button onclick="closeVideo()">❌ ปิด</button> </div> </div> 
 <script> function showVideo(){ document.getElementById("popup").style.display = "flex"; } function closeVideo(){ document.getElementById("popup").style.display = "none"; } </script>


</body>
</html>
